<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- Evita el zoom en navegadores móviles -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Mamones App</title>

<!-- PWA: que el navegador la detecte como app instalable -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mamones">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== NAV SUPERIOR (solo texto, sin iconos) ===== -->
<header class="topbar">
  <div class="brand">🍈 Mamones</div>
  <nav class="tabs">
    <button class="tab-btn active" data-view="venta">Venta</button>
    <button class="tab-btn" data-view="pedidos">Pedidos</button>
    <button class="tab-btn" data-view="stats">Estadísticas</button>
  </nav>
</header>

<main id="app">

  <!-- ===== VISTA: VENTA (HOME) ===== -->
  <section id="view-venta" class="view active">
    <form id="form-venta">

      <label class="field-label" for="cliente">Cliente</label>
      <input type="text" id="cliente" placeholder="Nombre del cliente" autocomplete="off" required>
      <div id="alerta-fiado" class="alerta-fiado oculto">⚠️ Este cliente tiene un pedido pendiente por cobrar</div>

      <div class="kg-selector">
        <button type="button" id="btn-restar" class="btn-kg" aria-label="Restar 0.5 kg">−</button>
        <input type="number" id="kg-input" step="0.5" min="0.5" value="1" inputmode="decimal">
        <button type="button" id="btn-sumar" class="btn-kg" aria-label="Sumar 0.5 kg">+</button>
      </div>
      <div class="kg-unidad">kg</div>

      <div class="total-preview">
        Total: <span id="total-preview">₡0</span>
      </div>

      <button type="submit" class="btn-principal">Registrar Pedido</button>
    </form>
  </section>

  <!-- ===== VISTA: PEDIDOS ===== -->
  <section id="view-pedidos" class="view">
    <div class="acciones-pedidos">
      <button id="btn-whatsapp" class="btn-secundario">Enviar por WhatsApp</button>
      <button id="btn-pdf" class="btn-secundario">Exportar PDF</button>
    </div>
    <div id="lista-pedidos" class="lista-pedidos">
      <p class="vacio" id="pedidos-vacio">Aún no hay pedidos registrados.</p>
    </div>
  </section>

  <!-- ===== VISTA: ESTADÍSTICAS ===== -->
  <section id="view-stats" class="view">
    <div class="stats-grid">
      <div class="stat-card ganancia">
        <div class="stat-label">Ganancias (cobrado)</div>
        <div class="stat-value" id="stat-ganancias">₡0</div>
      </div>
      <div class="stat-card pendiente">
        <div class="stat-label">Faltante por cobrar</div>
        <div class="stat-value" id="stat-pendiente">₡0</div>
      </div>
      <div class="stat-card kilos">
        <div class="stat-label">Kilos vendidos</div>
        <div class="stat-value" id="stat-kilos">0 kg</div>
      </div>
      <div class="stat-card pedidos-count">
        <div class="stat-label">Total de pedidos</div>
        <div class="stat-value" id="stat-pedidos">0</div>
      </div>
    </div>

    <h3 class="stats-subtitulo">Ventas por día (últimos 7 días)</h3>
    <div id="stats-dias" class="stats-dias"></div>

    <h3 class="stats-subtitulo">Mejores clientes</h3>
    <div id="stats-clientes" class="stats-clientes"></div>
  </section>

</main>

<!-- ===== MODAL DE CONFIRMACIÓN ===== -->
<div id="modal-confirm" class="modal-overlay oculto">
  <div class="modal-box">
    <p id="modal-texto">¿Seguro que deseas modificar este pedido?</p>
    <div class="modal-botones">
      <button id="modal-cancelar" class="btn-modal btn-cancelar">Cancelar</button>
      <button id="modal-aceptar" class="btn-modal btn-aceptar">Confirmar</button>
    </div>
  </div>
</div>

<!-- Librería para generar PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
