<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2F5233">
<title>Mamones · Registro de ventas</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <header class="topbar">
    <div class="brand">
      <span class="brand-fruit">🍈</span>
      <span class="brand-text">Mamones<br><small>Registro de ventas</small></span>
    </div>
    <div class="stock-pill" id="stockPill">Stock: -- kg</div>
  </header>

  <!-- ================= VISTA: VENDER ================= -->
  <main id="viewVender" class="view">

    <section class="card">
      <label for="clienteInput">Cliente</label>
      <input id="clienteInput" type="text" placeholder="Nombre del cliente" autocomplete="off" maxlength="40">
      <div id="fiadoAlert" class="fiado-alert hidden" role="alert"></div>
    </section>

    <section class="counter-card">
      <p class="counter-label">Cantidad</p>
      <div class="counter-wrap">
        <button id="btnMinus" class="counter-btn" aria-label="Restar medio kilo" type="button">−</button>
        <div class="counter-display">
          <input id="kgInput" class="kg-input" type="number" step="0.5" min="0.5" inputmode="decimal" value="1">
          <span class="kg-unit">kg</span>
        </div>
        <button id="btnPlus" class="counter-btn" aria-label="Sumar medio kilo" type="button">+</button>
      </div>
      <div class="total-row">
        <span>Total a cobrar</span>
        <strong id="totalDisplay">₡0</strong>
      </div>
    </section>

    <button id="btnRegistrar" class="btn-primary" type="button">Registrar pedido</button>
  </main>

  <!-- ================= VISTA: PEDIDOS ================= -->
  <main id="viewPedidos" class="view hidden">
    <div class="pedidos-header">
      <h2>Pedidos</h2>
      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-filter="todos" type="button">Todos</button>
        <button class="chip" data-filter="pendiente" type="button">Pendientes</button>
        <button class="chip" data-filter="pagado" type="button">Pagados</button>
      </div>
    </div>
    <div id="pedidosList" class="pedidos-list"></div>
    <p id="emptyState" class="empty-state hidden">Todavía no hay pedidos registrados.</p>
  </main>

  <nav class="tabbar">
    <button class="tab-btn active" data-view="vender" type="button">
      <span class="tab-icon">🧺</span><span>Vender</span>
    </button>
    <button class="tab-btn" data-view="pedidos" type="button">
      <span class="tab-icon">📋</span><span>Pedidos</span>
    </button>
  </nav>

</div>

<!-- Modal de confirmación -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <p id="modalText">¿Seguro que deseas modificar este pedido?</p>
    <div class="modal-actions">
      <button id="modalCancel" class="btn-secondary" type="button">Cancelar</button>
      <button id="modalConfirm" class="btn-primary" type="button">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<template id="pedidoCardTemplate">
  <div class="pedido-card">
    <div class="pedido-main">
      <div class="pedido-info">
        <span class="pedido-cliente"></span>
        <span class="pedido-detalle"></span>
        <span class="pedido-fecha"></span>
      </div>
      <div class="pedido-badges">
        <span class="badge aviso hidden">Aviso: Cobrar</span>
        <button class="badge-estado" data-action="toggle-pago" type="button"></button>
      </div>
    </div>

    <button class="btn-edit" data-action="edit" type="button">Editar pedido</button>

    <div class="edit-form hidden">
      <label>Cliente</label>
      <input class="edit-cliente" type="text" maxlength="40">
      <label>Kilos</label>
      <div class="counter-wrap small">
        <button class="counter-btn small" data-action="edit-minus" type="button">−</button>
        <div class="counter-display">
          <input class="edit-kg-input kg-input" type="number" step="0.5" min="0.5" inputmode="decimal">
          <span class="kg-unit">kg</span>
        </div>
        <button class="counter-btn small" data-action="edit-plus" type="button">+</button>
      </div>
      <div class="edit-actions">
        <button class="btn-secondary" data-action="cancel-edit" type="button">Cancelar</button>
        <button class="btn-primary" data-action="save-edit" type="button">Guardar cambios</button>
      </div>
    </div>
  </div>
</template>

<script src="app.js"></script>
</body>
</html>
